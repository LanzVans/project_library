<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Book Card</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  
  <div class="edit-modal">
    <form id="edit-form" novalidate>

      <h2>Edit book information</h2>

        
        
        <div class="field">        
          <label for="input-title">Title</label>
          <input type="text" id="input-title" value="">
          <small class="error"></small>
        </div>

        <div class="field">
          <label for="input-author">Autor</label>
          <input type="text" id="input-author" value="">
          <small class="error"></small>
        </div>
        
        <div class="field">
          <label for="input-year">Year</label>
          <input type="text" id="input-year" value="">
          <small class="error"></small>
        </div>

        <div class="field">
          <label for="input-pages">Pages</label>
          <input type="text" id="input-pages" value="">
          <small class="error"></small>
        </div>

             
        <div class="field">
          <label for="input-cover">Cover link</label>                
          <input type="text" id="input-cover" value="" >
          <small class="error"></small>
        </div>

        
        <div class="field">
          <label for="input-rating">Rating</label>
          <input type="text" id="input-rating" value="">
          <small class="error"></small>
        </div>   

        <div class="field">
          <label for="input-desc">Description</label>       
          <textarea id="input-desc" defaultValue = ""></textarea>         
          <small class="error"></small>
        </div> 
        
        <div class="field">
          <label for="input-genres">Genres</label>
          <input type="text" id="input-genres" value="">
          <small class="error"></small>
        </div> 

        <button type="submit">Submit changes</button>
        <button type="button" id="clear-form">Close</button>

      
    </form>
       
        
    </div>   
   
   <div class="tools-panel">
      <input class="book-search" type="text" placeholder="Enter book name...">
      <button class="book-btn search">Search 🔎</button>
      <button class="book-btn add">Add new +</button>
    </div> 
  
  <div class="library-container">
